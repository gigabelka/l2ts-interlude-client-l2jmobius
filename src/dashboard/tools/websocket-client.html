<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 Packet Monitor - WebSocket Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-connect {
            background: linear-gradient(135deg, #00b894, #00d4ff);
            color: #fff;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-disconnect {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-connected {
            background: rgba(0, 184, 148, 0.2);
            color: #00b894;
            border: 1px solid #00b894;
        }

        .status-disconnected {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .status-connecting {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid #f1c40f;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 150px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        .packets-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .packets-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .packets-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .packets-list {
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
        }

        .packet {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-left: 3px solid;
            transition: all 0.2s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .packet:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(5px);
        }

        .packet-connection { border-left-color: #f1c40f; }
        .packet-received { border-left-color: #00b894; }
        .packet-error { border-left-color: #e74c3c; }

        .packet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .packet-type {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .packet-time {
            font-size: 0.75rem;
            color: #888;
            font-family: monospace;
        }

        .packet-name {
            font-size: 0.85rem;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .packet-opcode {
            display: inline-block;
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: monospace;
            margin-right: 8px;
        }

        .packet-data {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 10px;
            margin-top: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
            color: #a8d5a2;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
        }

        .packet-data::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .packet-data::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .packet-data::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .packet-data::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.9rem;
            flex: 1;
            max-width: 300px;
        }

        .filter-input::placeholder {
            color: #666;
        }

        .filter-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        /* Scrollbar for packets list */
        .packets-list::-webkit-scrollbar {
            width: 10px;
        }

        .packets-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .packets-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .packets-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📡 L2 Packet Monitor</h1>
            <p class="subtitle">Real-time WebSocket client for Lineage 2 packet stream</p>
        </header>

        <div class="controls">
            <button id="connectBtn" class="btn btn-connect">🔗 Connect</button>
            <button id="disconnectBtn" class="btn btn-disconnect" disabled>❌ Disconnect</button>
            <button id="clearBtn" class="btn btn-clear">🗑️ Clear</button>
            <span id="status" class="status status-disconnected">Disconnected</span>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div id="packetCount" class="stat-value">0</div>
                <div class="stat-label">Total Packets</div>
            </div>
            <div class="stat-card">
                <div id="packetRate" class="stat-value">0</div>
                <div class="stat-label">Packets/sec</div>
            </div>
            <div class="stat-card">
                <div id="lastPacket" class="stat-value">-</div>
                <div class="stat-label">Last Packet</div>
            </div>
        </div>

        <div class="packets-container">
            <div class="packets-header">
                <span class="packets-title">📨 Incoming Packets</span>
                <span id="connectionInfo" style="color: #888; font-size: 0.85rem;">Not connected</span>
            </div>
            <div class="filter-bar">
                <input type="text" id="filterInput" class="filter-input" placeholder="🔍 Filter by packet name...">
            </div>
            <div id="packetsList" class="packets-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>No packets received yet</p>
                    <p style="font-size: 0.85rem; margin-top: 10px;">Click "Connect" to start receiving data</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // КОНФИГУРАЦИЯ
        // ============================================================================
        
        const WS_URL = 'ws://localhost:8080';
        const MAX_PACKETS = 100; // Максимальное количество пакетов в списке

        // ============================================================================
        // СОСТОЯНИЕ
        // ============================================================================
        
        let ws = null;
        let packets = [];
        let packetCount = 0;
        let packetsPerSecond = 0;
        let lastSecondPackets = 0;

        // ============================================================================
        // DOM ЭЛЕМЕНТЫ
        // ============================================================================
        
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusEl = document.getElementById('status');
        const packetsList = document.getElementById('packetsList');
        const packetCountEl = document.getElementById('packetCount');
        const packetRateEl = document.getElementById('packetRate');
        const lastPacketEl = document.getElementById('lastPacket');
        const connectionInfoEl = document.getElementById('connectionInfo');
        const filterInput = document.getElementById('filterInput');

        // ============================================================================
        // WEBSOCKET ФУНКЦИИ
        // ============================================================================
        
        function connect() {
            if (ws) return;

            updateStatus('connecting');
            connectionInfoEl.textContent = `Connecting to ${WS_URL}...`;

            try {
                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    console.log('✅ WebSocket connected');
                    updateStatus('connected');
                    connectionInfoEl.textContent = `Connected to ${WS_URL}`;
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handlePacket(data);
                    } catch (error) {
                        console.error('Failed to parse message:', error);
                        addPacket({
                            type: 'parse.error',
                            timestamp: new Date().toISOString(),
                            error: 'Invalid JSON received',
                            raw: event.data.slice(0, 200)
                        });
                    }
                };

                ws.onclose = () => {
                    console.log('❌ WebSocket disconnected');
                    updateStatus('disconnected');
                    connectionInfoEl.textContent = 'Disconnected';
                    ws = null;
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus('disconnected');
                    connectionInfoEl.textContent = 'Connection error';
                };

            } catch (error) {
                console.error('Failed to connect:', error);
                updateStatus('disconnected');
                connectionInfoEl.textContent = 'Failed to connect';
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        // ============================================================================
        // ОБРАБОТКА ПАКЕТОВ
        // ============================================================================
        
        function handlePacket(data) {
            packetCount++;
            lastSecondPackets++;
            
            // Обновляем статистику
            packetCountEl.textContent = packetCount;
            if (data.packetName) {
                lastPacketEl.textContent = data.packetName;
            }

            // Добавляем пакет в список
            addPacket(data);
        }

        function addPacket(data) {
            packets.unshift(data);
            
            // Ограничиваем размер истории
            if (packets.length > MAX_PACKETS) {
                packets = packets.slice(0, MAX_PACKETS);
            }

            renderPackets();
        }

        function renderPackets() {
            const filter = filterInput.value.toLowerCase();
            const filteredPackets = packets.filter(p => 
                !filter || 
                (p.packetName && p.packetName.toLowerCase().includes(filter)) ||
                (p.type && p.type.toLowerCase().includes(filter))
            );

            if (filteredPackets.length === 0) {
                packetsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>${packets.length === 0 ? 'No packets received yet' : 'No packets match filter'}</p>
                    </div>
                `;
                return;
            }

            packetsList.innerHTML = filteredPackets.map(packet => createPacketHTML(packet)).join('');
        }

        function createPacketHTML(packet) {
            const time = new Date(packet.timestamp || Date.now()).toLocaleTimeString('ru-RU', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                fractionalSecondDigits: 3
            });

            let typeClass = 'packet-connection';
            let typeLabel = packet.type;

            if (packet.type === 'packet.received') {
                typeClass = 'packet-received';
                typeLabel = 'RECEIVED';
            } else if (packet.type === 'packet.error') {
                typeClass = 'packet-error';
                typeLabel = 'ERROR';
            } else if (packet.type === 'connection.connected') {
                typeLabel = 'CONNECTED';
            } else if (packet.type === 'connection.closed') {
                typeLabel = 'DISCONNECTED';
            }

            let detailsHTML = '';
            
            if (packet.packetName) {
                detailsHTML += `<div class="packet-name">📦 ${escapeHtml(packet.packetName)}</div>`;
            }
            
            if (packet.opcode !== undefined) {
                detailsHTML += `<span class="packet-opcode">0x${packet.opcode.toString(16).padStart(2, '0').toUpperCase()}</span>`;
            }
            
            if (packet.data) {
                detailsHTML += `<pre class="packet-data">${escapeHtml(JSON.stringify(packet.data, null, 2))}</pre>`;
            } else if (packet.error) {
                detailsHTML += `<pre class="packet-data" style="color: #e74c3c;">${escapeHtml(packet.error)}</pre>`;
            }

            return `
                <div class="packet ${typeClass}">
                    <div class="packet-header">
                        <span class="packet-type">${escapeHtml(typeLabel)}</span>
                        <span class="packet-time">${time}</span>
                    </div>
                    ${detailsHTML}
                </div>
            `;
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return String(text);
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================================
        // UI ОБНОВЛЕНИЯ
        // ============================================================================
        
        function updateStatus(status) {
            statusEl.className = 'status';
            
            switch (status) {
                case 'connected':
                    statusEl.classList.add('status-connected');
                    statusEl.textContent = 'Connected';
                    break;
                case 'connecting':
                    statusEl.classList.add('status-connecting');
                    statusEl.textContent = 'Connecting...';
                    break;
                default:
                    statusEl.classList.add('status-disconnected');
                    statusEl.textContent = 'Disconnected';
            }
        }

        function clearPackets() {
            packets = [];
            packetCount = 0;
            lastSecondPackets = 0;
            packetCountEl.textContent = '0';
            packetRateEl.textContent = '0';
            lastPacketEl.textContent = '-';
            renderPackets();
        }

        // ============================================================================
        // ОБНОВЛЕНИЕ СКОРОСТИ ПАКЕТОВ
        // ============================================================================
        
        setInterval(() => {
            packetsPerSecond = lastSecondPackets;
            lastSecondPackets = 0;
            packetRateEl.textContent = packetsPerSecond;
        }, 1000);

        // ============================================================================
        // ОБРАБОТЧИКИ СОБЫТИЙ
        // ============================================================================
        
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        clearBtn.addEventListener('click', clearPackets);
        filterInput.addEventListener('input', renderPackets);

        // Автоподключение при загрузке (опционально)
        // connect();

        console.log('🎮 L2 Packet Monitor loaded');
        console.log('Click "Connect" to start receiving packets from ws://localhost:8080');
    </script>
</body>
</html>
